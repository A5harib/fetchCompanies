<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Company Directory | Search O' Pal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      .company-card:hover {
        transform: translateY(-5px);
        transition: all 0.3s ease;
      }
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen">
    <header class="bg-white border-b sticky top-0 z-10">
      <div
        class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center"
      >
        <h1 class="text-2xl font-bold text-slate-800">
          <i class="fas fa-building text-blue-600 mr-2"></i>Company Insights
        </h1>
        <div
          id="stats"
          class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full"
        >
          Loading data...
        </div>
      </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 mt-8">
      <input
        type="text"
        id="searchInput"
        placeholder="Search by name, city or email..."
        class="w-full p-4 rounded-xl border border-slate-200 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none"
      />
    </div>

    <main class="max-w-7xl mx-auto px-4 py-8">
      <div
        id="company-grid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      ></div>
    </main>

    <script>
      const grid = document.getElementById("company-grid");
      const stats = document.getElementById("stats");
      const searchInput = document.getElementById("searchInput");
      let allCompanies = [];

      async function loadData() {
        try {
          const response = await fetch("companies_data.json");
          allCompanies = await response.json();
          renderCards(allCompanies);
          stats.innerText = `${allCompanies.length} Companies Found`;
        } catch (err) {
          grid.innerHTML = `<div class="col-span-full text-center py-10 text-red-500">Failed to load companies_data.json. Make sure the file exists in the same folder.</div>`;
        }
      }

      function renderCards(data) {
        grid.innerHTML = data
          .map((company) => {
            // --- URL CLEANING LOGIC START ---
            let logo = company.logo;

            if (logo && logo.includes("?")) {
              // Split by '?' and take the first part (index 0)
              logo = logo.split("?")[0];
            }

            // Fallback to initials if logo is null or empty
            const finalLogo =
              logo ||
              `https://ui-avatars.com/api/?name=${encodeURIComponent(company.name)}&background=random&size=128`;
            // --- URL CLEANING LOGIC END ---

            const websiteDisplay = company.website
              ? `<a href="https://${company.website}" target="_blank" class="text-blue-600 hover:underline truncate"><i class="fas fa-link mr-1"></i>${company.website}</a>`
              : '<span class="text-slate-400">No website</span>';

            return `
            <div class="company-card bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col justify-between">
                <div>
                    <div class="flex items-start justify-between mb-4">
                        <img src="${finalLogo}" alt="logo" class="w-16 h-16 rounded-xl object-cover border border-slate-100 shadow-sm" 
                             onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(company.name)}&background=eaeaea&color=666'">
                        <span class="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-md uppercase">
                            ${company.open_positions || 0} Positions
                        </span>
                    </div>
                    
                    <h2 class="text-xl font-bold text-slate-800 mb-1 truncate">${company.name}</h2>
                    <p class="text-sm text-slate-500 mb-3"><i class="fas fa-map-marker-alt mr-1"></i> ${company.city}, ${company.country}</p>
                    
                    <p class="text-slate-600 text-sm line-clamp-2 mb-4 h-10">
                        ${company.description || "No description provided for this company."}
                    </p>
                </div>

                <div class="border-t pt-4 space-y-2">
                    <div class="flex items-center text-sm text-slate-600">
                        <i class="fas fa-envelope w-5 text-slate-400"></i>
                        <span class="truncate">${company.email}</span>
                    </div>
                    <div class="flex items-center text-sm text-slate-600">
                        <i class="fas fa-phone w-5 text-slate-400"></i>
                        <span>${company.phone}</span>
                    </div>
                    <div class="flex items-center text-sm">
                        ${websiteDisplay}
                    </div>
                </div>
            </div>
        `;
          })
          .join("");
      }

      // Search Filter Logic
      searchInput.addEventListener("input", (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allCompanies.filter(
          (c) =>
            c.name.toLowerCase().includes(term) ||
            c.city.toLowerCase().includes(term) ||
            c.email.toLowerCase().includes(term),
        );
        renderCards(filtered);
      });

      loadData();
    </script>
  </body>
</html>
